[build]
  command = "mkdir -p assets && curl https://play.pokemonshowdown.com/style/client.css -o assets/client.css && curl https://play.pokemonshowdown.com/js/lib/jquery-2.1.4.min.js -o assets/jquery.js && curl https://play.pokemonshowdown.com/js/client.js -o assets/client.js"
  publish = "."

[[redirects]]
  from = "/showdown-proxy/*"
  to = "https://sim3.psim.us/:splat"
  status = 200
  force = true

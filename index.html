<!DOCTYPE html>
<html>
<head>
    <title>Showdown Stealth Gateway</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/assets/client.css" />
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.2.3/backbone-min.js"></script></head>
<body>
    <div id="header"></div>
    <div id="main"></div>
    <div id="footer"></div>

<script>
        // Set the config
        window.Config = {
            server: {
                host: window.location.hostname,
                port: 443,
                id: 'showdown',
                protocol: 'https',
                path: '/showdown-proxy/'
            }
        };

        // This prevents the app from crashing if it tries to load 'panels' too early
        window.app = {
            receive: function(data) { console.log("Data received:", data); }
        };
    </script>
    
    <script src="/assets/client.js"></script>

    <script>
        // This is the manual "Kickstart" for the UI
        $(function() {
            if (window.App) {
                window.app = new App();
            } else {
                console.error("App class not found in client.js");
            }
        });
    </script>
</body>
</html>
